name: Build Android Bundle
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Create Package and Build
        run: |
          cd "Al-Mumin-Guide__"
          
          # 1. Zabardasti package.json banana
          npm init -y
          
          # 2. Capacitor aur Android dependencies install karna
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 3. Project setup
          npx cap init "Al Mumin Guide" com.gsons.mumin --web-dir .
          npx cap add android || true
          npx cap sync android
          
          # 4. Final Compilation
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload .aab Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: "**/app-release.aab"
