name: Build Android Bundle
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node Project & Capacitor
        run: |
          cd "Al-Mumin-Guide__"
          # 1. package.json agar nahi hai to bana do
          if [ ! -f package.json ]; then
            npm init -y
          fi
          # 2. Capacitor install karo (Deepseek ki advice)
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # 3. Project initialize karo
          npx cap init "Al Mumin Guide" com.gsons.mumin --web-dir .
          # 4. Android platform add aur sync karo
          npx cap add android || true
          npx cap sync android
          
          # 5. Final Build
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload .aab Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: "**/app-release.aab"
